<!DOCTYPE html>
<html>
<head>
    <title>AK Bank</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            padding:0;
            background:#f5f7fb;
            font-family:Arial,sans-serif;
        }
    </style>
</head>

<body>

{% if request.session.user_id %}

<!-- DASHBOARD -->

<div style="background:linear-gradient(135deg,#1a73e8,#0d47a1);
            color:white;padding:28px 32px;border-radius:16px;
            margin:24px;display:flex;
            justify-content:space-between;align-items:center">

    <div>
        <h2 style="margin:0">
            👋 Welcome, {{ request.session.user_name }}!
        </h2>

        <p style="opacity:0.8;margin-top:6px">
            AK Bank Dashboard — Aapki Sabhi Services Yahan Hain
        </p>
    </div>

</div>

{% else %}

<!-- HOME PAGE -->

<div style="background:linear-gradient(135deg,#1a73e8,#0d47a1);
            color:white;padding:60px 40px;text-align:center;
            border-radius:16px;margin:24px">

    <h1 style="font-size:42px;margin:0">
        🏦 AK Bank
    </h1>

    <p style="font-size:18px;margin-top:12px;opacity:0.9">
        Aapka Bharosa, Hamari Zimmedari
    </p>

    <p style="font-size:14px;opacity:0.7;margin-top:6px">
        Since 2000 — Serving India with Trust
    </p>

</div>

{% endif %}

<!-- FOOTER -->

<footer style="background:#0d1b2a;color:#ccc;padding:40px 20px;
               margin-top:40px">

    <div style="text-align:center">

        <h3 style="color:white">
            🏦 AK Bank
        </h3>

        <p>
            © 2026 AK Bank | Developed by
            <b style="color:white">@Ankit Kumar</b>
        </p>

    </div>

</footer>

</body>
</html>
