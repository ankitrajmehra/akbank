<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Bank</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f7fb;
        }

        /* NAVBAR */

        nav{
            background:linear-gradient(135deg,#1a73e8,#0d47a1);
            padding:16px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            color:white;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        nav .logo{
            font-size:24px;
            font-weight:bold;
        }

        nav .links a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-size:14px;
            font-weight:bold;
        }

        nav .links a:hover{
            opacity:0.8;
        }

        .container{
            width:95%;
            max-width:1200px;
            margin:25px auto;
        }

        @media(max-width:768px){

            nav{
                flex-direction:column;
                gap:10px;
                text-align:center;
            }

        }

    </style>

</head>

<body>

<nav>

    <div class="logo">
        🏦 AK Bank
    </div>

    <div class="links">

        <a href="/">Home</a>

        <a href="{% url 'bank:signup' %}">
            Register
        </a>

        <a href="{% url 'bank:signin' %}">
            Login
        </a>

        <a href="/admin/">
            Admin
        </a>

    </div>

</nav>

<div class="container">

    {% block content %}

    {% endblock %}

</div>

</body>
</html>
