{% extends 'bank/master.html' %}
{% block content %}

<div style="background:white;border-radius:12px;padding:32px;
            max-width:500px;margin:auto;
            box-shadow:0 2px 8px rgba(0,0,0,0.1)">

    <h2 style="color:red">💸 Withdraw Amount</h2>
    <p><b>Account No:</b> {{ account.account_no }}</p>
    <p><b>Name:</b> {{ account.name }}</p>
    <p><b>Current Balance:</b> 
        <span style="color:green;font-weight:bold">₹{{ account.balance }}</span>
    </p>

    {% if error %}
    <p style="color:red;background:#fce8e6;padding:10px;border-radius:6px">
        {{ error }}
    </p>
    {% endif %}

    <form method="POST" style="margin-top:20px">
        {% csrf_token %}
        <label><b>Amount:</b></label>
        <input type="number" name="amount" required placeholder="Enter amount"
            style="width:100%;padding:10px;margin:8px 0 20px;
                   border:1px solid #ddd;border-radius:6px;font-size:16px">
        <button type="submit"
            style="background:red;color:white;padding:12px;border:none;
                   border-radius:8px;cursor:pointer;width:100%;font-size:16px">
            💸 Withdraw Money
        </button>
    </form>
    <a href="{% url 'bank:balance' %}"
        style="display:block;text-align:center;margin-top:12px;color:gray">
        ← Back
    </a>
</div>
{% endblock %}
