<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Bank</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f7fb;
        }

        /* NAVBAR */

        nav{
            background:linear-gradient(135deg,#1a73e8,#0d47a1);
            padding:16px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            color:white;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        nav .logo{
            font-size:24px;
            font-weight:bold;
        }

        nav .links a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-size:14px;
            font-weight:bold;
        }

        nav .links a:hover{
            opacity:0.8;
        }

        /* CONTAINER */

        .container{
            width:95%;
            max-width:1200px;
            margin:25px auto;
        }

        /* FOOTER */

        footer{
            background:#0d1b2a;
            color:#ccc;
            padding:40px 20px;
            margin-top:40px;
        }

        footer .footer-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            max-width:1100px;
            margin:auto;
        }

        footer h3{
            color:white;
            margin-bottom:10px;
        }

        footer p,
        footer li,
        footer a{
            font-size:14px;
            color:#ccc;
            text-decoration:none;
            line-height:1.7;
        }

        footer ul{
            list-style:none;
        }

        footer .bottom{
            text-align:center;
            margin-top:30px;
            border-top:1px solid #444;
            padding-top:20px;
        }

        /* MOBILE */

        @media(max-width:768px){

            nav{
                flex-direction:column;
                gap:10px;
                text-align:center;
            }

            footer .footer-grid{
                grid-template-columns:1fr;
                text-align:center;
            }

        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav>

        <div class="logo">
            🏦 AK Bank
        </div>

        <div class="links">

            <a href="/">Home</a>

            <a href="/admin/">Admin</a>

            <a href="/signup/">Register</a>

            <a href="/signin/">Login</a>

        </div>

    </nav>

    <!-- PAGE CONTENT -->

    <div class="container">

        {% block content %}

        {% endblock %}

    </div>

</body>
</html>
